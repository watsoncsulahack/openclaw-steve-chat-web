<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Steve Chat (Prototype)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="drawer" class="drawer">
        <div class="drawer-header">
          <h2>Steve Chat</h2>
          <div class="drawer-header-actions">
            <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
            <button id="drawerCompactBtn" class="icon-btn" title="Toggle compact sidebar">◧</button>
            <button id="closeDrawerBtn" class="icon-btn">✕</button>
          </div>
        </div>

        <div id="sidebarRail" class="sidebar-rail"></div>

        <section class="drawer-section drawer-chats">
          <div class="drawer-section-head">
            <h3>All chats</h3>
            <button id="newChatBtn" class="secondary mini">＋</button>
          </div>
          <div id="chatSearchWrap" class="chat-search-wrap">
            <input id="chatSearchInput" type="text" placeholder="Search chats" />
            <button id="clearChatSearchBtn" class="chat-search-clear" title="Clear search">✕</button>
          </div>
          <div id="chatList" class="chat-list"></div>
        </section>
      </aside>

      <div id="backdrop" class="backdrop"></div>

      <main class="phone-frame">
        <header class="topbar">
          <button id="menuBtn" class="icon-btn">☰</button>

          <button id="modelPickerBtn" class="model-pill">
            <span id="currentModelLabel">Gemma 3N E4B</span>
            <span class="chev">▾</span>
          </button>

          <div class="topbar-actions">
            <div id="tpsBadge" class="tps-badge" title="Tokens per second">TPS: --</div>
            <div class="status-dot" aria-label="connection status"></div>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <footer class="composer">
          <button id="plusBtn" class="composer-icon">＋</button>
          <input id="messageInput" type="text" placeholder="Chat with Steve..." />
          <button id="micBtn" class="composer-mic" aria-pressed="false" title="Mock microphone">🎤</button>
          <button id="sendBtn" class="composer-send">➤</button>
        </footer>
      </main>
    </div>

    <section id="modelSheet" class="model-sheet">
      <div class="model-sheet-card">
        <div class="model-sheet-head">
          <h3>Select model</h3>
          <button id="closeModelSheetBtn" class="icon-btn">✕</button>
        </div>
        <div id="modelList" class="model-list"></div>
      </div>
    </section>

    <section id="settingsSheet" class="model-sheet settings-modal">
      <div class="model-sheet-card settings-card">
        <div class="model-sheet-head">
          <h3>Settings</h3>
          <button id="closeSettingsBtn" class="icon-btn">✕</button>
        </div>
        <div class="settings-body">
          <label class="field-label" for="baseUrlInput">Model endpoint</label>
          <input id="baseUrlInput" type="text" value="http://127.0.0.1:18080" />
          <div class="drawer-row">
            <button id="saveBaseUrlBtn" class="secondary">Save</button>
            <button id="detectModelsBtn" class="secondary">Detect</button>
          </div>
          <div class="mode-row">
            <button id="mockModeBtn" class="secondary mode-btn active">UI Demo</button>
            <button id="runtimeModeBtn" class="secondary mode-btn">Local Runtime</button>
          </div>
          <p id="modeHint" class="hint">UI Demo mode uses mock Steve replies for flow testing.</p>
        </div>
      </div>
    </section>

    <template id="msgTemplate">
      <article class="msg-row">
        <div class="avatar"></div>
        <div class="bubble"></div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
