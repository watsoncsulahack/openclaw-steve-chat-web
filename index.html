<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Steve Chat (Prototype)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="drawer" class="drawer">
        <div class="drawer-header">
          <h2>Steve Chat</h2>
          <div class="drawer-header-actions">
            <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
            <button id="archivesBtn" class="icon-btn" title="Show archived chats" aria-pressed="false">
              <svg class="archive-glyph" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6h16" />
                <rect x="5" y="6" width="14" height="13" rx="2" />
                <path d="M9 11h6" />
                <path d="M9 14h6" />
              </svg>
            </button>
            <button id="drawerCompactBtn" class="icon-btn" title="Toggle compact sidebar">◧</button>
            <button id="closeDrawerBtn" class="icon-btn">✕</button>
          </div>
        </div>

        <div id="sidebarRail" class="sidebar-rail"></div>

        <section class="drawer-section drawer-chats">
          <div class="drawer-section-head">
            <h3 id="chatListTitle">All chats</h3>
            <button id="newChatBtn" class="secondary mini">＋</button>
          </div>
          <div id="chatSearchWrap" class="chat-search-wrap">
            <input id="chatSearchInput" type="text" placeholder="Search chats" />
            <button id="clearChatSearchBtn" class="chat-search-clear" title="Clear search">✕</button>
          </div>
          <div id="chatList" class="chat-list"></div>
        </section>
      </aside>

      <div id="backdrop" class="backdrop"></div>

      <main class="phone-frame">
        <header class="topbar">
          <button id="menuBtn" class="icon-btn">☰</button>

          <button id="modelPickerBtn" class="model-pill">
            <span id="currentModelLabel">Gemma 3N E4B</span>
            <span class="chev">▾</span>
          </button>

          <div class="topbar-actions">
            <button id="themeToggleBtn" class="icon-btn" title="Toggle light/dark mode">☀</button>
            <div class="status-dot" aria-label="connection status"></div>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <div id="replyBanner" class="reply-banner hidden">
          <div id="replyBannerText" class="reply-banner-text"></div>
          <button id="clearReplyBtn" class="reply-banner-clear" title="Cancel reply">✕</button>
        </div>

        <footer class="composer">
          <button id="plusBtn" class="composer-icon">＋</button>
          <input id="messageInput" type="text" placeholder="Chat with Steve..." />
          <button id="micBtn" class="composer-mic" aria-pressed="false" title="Mock microphone">
            <svg class="mic-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4c-1.8 0-3 1.3-3 3v4c0 1.7 1.2 3 3 3s3-1.3 3-3V7c0-1.7-1.2-3-3-3z" />
              <path d="M6.5 11.2c0 3.1 2.3 5.4 5.5 5.4s5.5-2.3 5.5-5.4" />
              <path d="M12 16.7v3.3" />
              <path d="M9 20h6" />
            </svg>
          </button>
          <button id="sendBtn" class="composer-send" title="Send message">
            <svg class="send-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12h14" />
              <path d="M12 5l8 7-8 7" />
            </svg>
          </button>
        </footer>
      </main>
    </div>

    <section id="modelSheet" class="model-sheet">
      <div class="model-sheet-card">
        <div class="model-sheet-head">
          <h3>Select model</h3>
          <button id="closeModelSheetBtn" class="icon-btn">✕</button>
        </div>
        <div id="modelList" class="model-list"></div>
      </div>
    </section>

    <section id="settingsSheet" class="model-sheet settings-modal">
      <div class="model-sheet-card settings-card">
        <div class="model-sheet-head">
          <h3>Settings</h3>
          <button id="closeSettingsBtn" class="icon-btn">✕</button>
        </div>
        <div class="settings-body">
          <label class="field-label" for="baseUrlInput">Model endpoint</label>
          <input id="baseUrlInput" type="text" value="http://127.0.0.1:18080" />
          <div class="drawer-row">
            <button id="saveBaseUrlBtn" class="secondary">Save</button>
            <button id="detectModelsBtn" class="secondary">Detect</button>
          </div>
          <div class="drawer-row">
            <button id="connectLocalLlamaBtn" class="secondary" title="Set endpoint to selected local llama backend and detect models">Connect local llama.cpp</button>
          </div>
          <div class="mode-row backend-row">
            <button id="backendRegularBtn" class="secondary mode-btn active">Regular llama.cpp</button>
            <button id="backendQvacBtn" class="secondary mode-btn">QVAC fabric llama.cpp</button>
          </div>
          <div class="mode-row">
            <button id="mockModeBtn" class="secondary mode-btn active">UI Demo</button>
            <button id="runtimeModeBtn" class="secondary mode-btn">Local Runtime</button>
          </div>
          <div class="toggle-row">
            <label><input id="streamModeToggle" type="checkbox" checked /> Stream live responses</label>
            <label><input id="ttsToggle" type="checkbox" /> Speak assistant replies</label>
          </div>
          <p id="runtimeStatus" class="hint">Runtime: idle.</p>
          <p id="modeHint" class="hint">UI Demo mode uses mock Steve replies for flow testing.</p>
        </div>
      </div>
    </section>

    <template id="msgTemplate">
      <article class="msg-row">
        <div class="avatar"></div>
        <div class="bubble"></div>
      </article>
    </template>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
