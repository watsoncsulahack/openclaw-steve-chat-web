name: qvac termux bionic arm64

on:
  workflow_dispatch:
    inputs:
      qvac_ref:
        description: "qvac git ref (tag/branch/sha)"
        required: false
        default: "b7336"

jobs:
  build:
    name: "android-bionic-${{ matrix.variant }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            ggml_vulkan: "OFF"
          - variant: vulkan
            ggml_vulkan: "ON"

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git pkg-config ca-certificates unzip

      - name: Install Vulkan build deps
        if: ${{ matrix.variant == 'vulkan' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev \
            vulkan-headers \
            glslc

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone qvac source
        env:
          QVAC_REF: ${{ github.event.inputs.qvac_ref || 'b7336' }}
        run: |
          rm -rf qvac-src
          git clone --depth 1 --branch "$QVAC_REF" https://github.com/tetherto/qvac-fabric-llm.cpp.git qvac-src
          cd qvac-src
          git rev-parse HEAD

      - name: Ensure Vulkan C++ header is available
        if: ${{ matrix.variant == 'vulkan' }}
        run: |
          set -euo pipefail
          TARGET_DIR="qvac-src/ggml/src/ggml-vulkan/vulkan_cpp_wrapper/include/vulkan"
          mkdir -p "$TARGET_DIR"
          if [ ! -f "$TARGET_DIR/vulkan.hpp" ]; then
            if [ -f /usr/include/vulkan/vulkan.hpp ]; then
              cp -f /usr/include/vulkan/vulkan.hpp "$TARGET_DIR/vulkan.hpp"
            else
              echo "vulkan.hpp not found in /usr/include/vulkan" >&2
              exit 1
            fi
          fi

      - name: Configure Android arm64 build
        working-directory: qvac-src
        run: |
          cmake -S . -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared \
            -DGGML_VULKAN=${{ matrix.ggml_vulkan }} \
            -DGGML_OPENMP=OFF \
            -DLLAMA_OPENMP=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_MTMD=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF

      - name: Build llama-server
        working-directory: qvac-src
        run: |
          cmake --build build-android --target llama-server -j 2

      - name: Package artifact
        working-directory: qvac-src
        run: |
          set -euo pipefail
          OUT="dist/qvac-b7336-android-bionic-arm64-${{ matrix.variant }}"
          mkdir -p "$OUT"

          cp -f build-android/bin/llama-server "$OUT/"
          for f in \
            build-android/bin/libllama.so* \
            build-android/bin/libggml*.so* \
            build-android/bin/libggml-*.so* \
            build-android/bin/libmtmd.so* \
            "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so"; do
            if [ -e "$f" ]; then cp -f "$f" "$OUT/"; fi
          done

          tar -czf "qvac-b7336-android-bionic-arm64-${{ matrix.variant }}.tar.gz" -C "$OUT" .
          sha256sum "qvac-b7336-android-bionic-arm64-${{ matrix.variant }}.tar.gz" > "qvac-b7336-android-bionic-arm64-${{ matrix.variant }}.tar.gz.sha256"
          sha256sum "$OUT/llama-server" > "qvac-b7336-android-bionic-arm64-${{ matrix.variant }}-llama-server.sha256"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: qvac-b7336-android-bionic-arm64-${{ matrix.variant }}.tar.gz
          path: qvac-src/qvac-b7336-android-bionic-arm64-${{ matrix.variant }}.tar.gz

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: qvac-b7336-android-bionic-arm64-${{ matrix.variant }}-sha256
          path: |
            qvac-src/qvac-b7336-android-bionic-arm64-${{ matrix.variant }}.tar.gz.sha256
            qvac-src/qvac-b7336-android-bionic-arm64-${{ matrix.variant }}-llama-server.sha256
