name: qvac mini phase 2A arm64 binaries

on:
  workflow_dispatch:
    inputs:
      qvac_ref:
        description: "qvac git ref (tag/branch/sha)"
        required: false
        default: "b7336"
  push:
    paths:
      - ".github/workflows/qvac-mini-phase2a-arm64.yml"

jobs:
  build:
    name: "${{ matrix.variant }} on arm64"
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            ggml_vulkan: "OFF"
          - variant: vulkan
            ggml_vulkan: "ON"

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            pkg-config \
            ca-certificates \
            libcurl4-openssl-dev

      - name: Install Vulkan deps
        if: ${{ matrix.variant == 'vulkan' }}
        run: |
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev \
            glslc

      - name: Clone qvac source
        env:
          QVAC_REF: ${{ github.event.inputs.qvac_ref || 'b7336' }}
        run: |
          rm -rf qvac-src
          git clone --depth 1 --branch "$QVAC_REF" https://github.com/tetherto/qvac-fabric-llm.cpp.git qvac-src
          cd qvac-src
          git rev-parse HEAD

      - name: Configure
        working-directory: qvac-src
        env:
          CC: /usr/bin/gcc
          CXX: /usr/bin/g++
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DGGML_VULKAN=${{ matrix.ggml_vulkan }} \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_MTMD=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF

      - name: Build llama-server
        working-directory: qvac-src
        run: |
          cmake --build build --target llama-server -j 2

      - name: Package artifact
        working-directory: qvac-src
        run: |
          set -euo pipefail
          OUT="dist/qvac-b7336-linux-arm64-${{ matrix.variant }}"
          mkdir -p "$OUT"

          cp -f build/bin/llama-server "$OUT/"
          for f in build/bin/libllama.so* build/bin/libggml*.so* build/bin/libggml-*.so* build/bin/libmtmd.so*; do
            if [ -e "$f" ]; then cp -f "$f" "$OUT/"; fi
          done

          tar -czf "qvac-b7336-linux-arm64-${{ matrix.variant }}.tar.gz" -C "$OUT" .
          sha256sum "qvac-b7336-linux-arm64-${{ matrix.variant }}.tar.gz" > "qvac-b7336-linux-arm64-${{ matrix.variant }}.tar.gz.sha256"
          sha256sum "$OUT/llama-server" > "qvac-b7336-linux-arm64-${{ matrix.variant }}-llama-server.sha256"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: qvac-b7336-linux-arm64-${{ matrix.variant }}.tar.gz
          path: qvac-src/qvac-b7336-linux-arm64-${{ matrix.variant }}.tar.gz

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: qvac-b7336-linux-arm64-${{ matrix.variant }}-sha256
          path: |
            qvac-src/qvac-b7336-linux-arm64-${{ matrix.variant }}.tar.gz.sha256
            qvac-src/qvac-b7336-linux-arm64-${{ matrix.variant }}-llama-server.sha256
